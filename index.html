<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    :root {
      color-scheme: light dark;

      --accent:      light-dark(#4f46e5, #818cf8);
      --accent-dark: light-dark(#4338ca, #6366f1);
      --bg-page:     light-dark(#f0f4f8, #0f172a);
      --bg-card:     light-dark(#ffffff, #1e293b);
      --bg-item:     light-dark(#f8fafc, #0f172a);
      --border:      light-dark(#e2e8f0, #334155);
      --text-main:   light-dark(#1e293b, #f1f5f9);
      --text-title:  light-dark(#1a1a2e, #e2e8f0);
      --text-muted:  light-dark(#64748b, #94a3b8);
      --text-faint:  light-dark(#94a3b8, #475569);
      --del-icon:    light-dark(#cbd5e1, #475569);
      --del-bg:      light-dark(#fee2e2, #450a0a);
      --del-color:   light-dark(#ef4444, #f87171);
      --del-border:  light-dark(#fca5a5, #7f1d1d);
      --shadow:      light-dark(rgba(0,0,0,0.10), rgba(0,0,0,0.40));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: 0 4px 24px var(--shadow);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: var(--text-title);
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      background: var(--bg-card);
      color: var(--text-main);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus-visible {
      border-color: var(--accent);
    }

    .input-row button {
      padding: 10px 18px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: var(--accent-dark); }

    .input-row button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .stats {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: var(--bg-item);
      border: 1px solid var(--border);
      transition: opacity 0.2s;
    }

    li.checked { opacity: 0.5; }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    li input[type="checkbox"]:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    li .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: var(--text-main);
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: var(--text-faint);
    }

    li button.delete {
      background: none;
      border: none;
      color: var(--del-icon);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    li button.delete:hover {
      color: var(--del-color);
      background: var(--del-bg);
    }

    li button.delete:focus-visible {
      outline: 2px solid var(--del-color);
      outline-offset: 2px;
    }

    .empty {
      text-align: center;
      color: var(--text-faint);
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .clear-btn {
      width: 100%;
      margin-top: 16px;
      padding: 9px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .clear-btn:hover {
      background: var(--del-bg);
      color: var(--del-color);
      border-color: var(--del-border);
    }

    .clear-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button id="addBtn">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <div class="empty" id="empty">아이템을 추가해 보세요!</div>

    <button class="clear-btn" id="clearBtn">완료 항목 모두 삭제</button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping') || '[]');

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      const list  = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent = '';
      } else {
        empty.style.display = 'none';
        const done = items.filter(i => i.checked).length;
        stats.textContent = `전체 ${items.length}개 · 완료 ${done}개`;

        items.forEach((item, idx) => {
          const li = document.createElement('li');
          if (item.checked) li.classList.add('checked');

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = item.checked;
          cb.addEventListener('change', () => toggle(idx));

          const span = document.createElement('span');
          span.className = 'item-text';
          span.textContent = item.text;

          const del = document.createElement('button');
          del.className = 'delete';
          del.textContent = '✕';
          del.setAttribute('aria-label', `${item.text} 삭제`);
          del.addEventListener('click', () => remove(idx));

          li.appendChild(cb);
          li.appendChild(span);
          li.appendChild(del);
          list.appendChild(li);
        });
      }
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      input.value = '';
      save();
      render();
      input.focus();
    }

    function toggle(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function remove(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    document.getElementById('addBtn').addEventListener('click', addItem);
    document.getElementById('clearBtn').addEventListener('click', clearChecked);
    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
